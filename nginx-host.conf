# Host Nginx config for izinet (Reality Fallback)
# Copy to: /etc/nginx/sites-available/izinet
# DO NOT include events {} or http {} — those are in the main nginx.conf

server {
    listen 3443 ssl;
    server_name izinet.online www.izinet.online;

    ssl_certificate     /etc/letsencrypt/live/izinet.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/izinet.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Backend-Server "izinet-app" always;

    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

server {
    listen 80;
    server_name izinet.online www.izinet.online;
    return 301 https://$host$request_uri;
}
