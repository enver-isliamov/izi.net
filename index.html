<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="enot" content="e9cc3f3d" />
    <title>izinet - VPN Service</title>
    <script>
      // Silence Vite HMR errors that are expected in this environment
      window.addEventListener('unhandledrejection', (event) => {
        if (event.reason && (
          event.reason.message?.includes('WebSocket closed without opened') ||
          event.reason.message?.includes('failed to connect to websocket')
        )) {
          event.preventDefault();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
