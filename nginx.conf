events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Основной сервер для обработки трафика от Xray (Reality Fallback)
    server {
        listen 3443 ssl http2;
        server_name _; # Принимать любой домен

        # Пути к сертификатам (будут проброшены из хоста)
        ssl_certificate /etc/letsencrypt/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/privkey.pem;

        location / {
            proxy_pass http://izinet-app:3005;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Редирект с HTTP на HTTPS (на порт 443, где слушает Xray)
    server {
        listen 80;
        server_name _;
        location / {
            return 301 https://$host$request_uri;
        }
    }
}
