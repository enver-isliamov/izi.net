events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Логи в консоль Docker
    access_log /dev/stdout;
    error_log /dev/stderr info;

    # Основной сервер для обработки трафика от Xray (Reality Fallback)
    server {
        listen 3443 ssl;
        http2 on;
        server_name izinet.online www.izinet.online;

        # Пути к сертификатам внутри контейнера
        ssl_certificate /etc/letsencrypt/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/privkey.pem;

        # Добавляем заголовок для отладки
        add_header X-Backend-Server "izinet-app" always;

        location / {
            proxy_pass http://izinet-app:3005;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Таймауты
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    # Редирект с HTTP на HTTPS (на порт 443, где слушает Xray)
    server {
        listen 80;
        server_name _;
        location / {
            return 301 https://$host$request_uri;
        }
    }
}
