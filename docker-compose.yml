services:
  izinet-app:
    build:
      context: .
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    container_name: izinet-app
    restart: unless-stopped
    ports:
      - "3005:3005"
    dns:
      - 77.88.8.8
      - 94.140.14.14
      - 9.9.9.9
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - XUI_HOST=http://x3-ui:2053
      - IS_DOCKER=true
    env_file:
      - .env
    depends_on:
      - x3-ui
    networks:
      - izinet-net

  xui-bootstrap:
    image: python:3.12-alpine
    container_name: xui-bootstrap
    restart: "no"
    command: ["python", "/opt/izinet/xui_bootstrap.py", "--wait-db", "2"]
    volumes:
      - ./xui-db:/opt/izinet/xui-db
      - ./xui_bootstrap.py:/opt/izinet/xui_bootstrap.py:ro
    networks:
      - izinet-net

  x3-ui:
    image: ghcr.io/mhsanaei/3x-ui:latest
    container_name: x3-ui
    restart: unless-stopped
    ports:
      - "2053:2053"
      - "443:443"
      - "8443:8443"
    dns:
      - 77.88.8.8
      - 94.140.14.14
      - 9.9.9.9
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./xui-db:/etc/x-ui
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      xui-bootstrap:
        condition: service_completed_successfully
    networks:
      - izinet-net

networks:
  izinet-net:
    driver: bridge
