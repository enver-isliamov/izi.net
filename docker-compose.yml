services:
  izinet-app:
    build: .
    container_name: izinet-app
    restart: unless-stopped
    ports:
      - "3005:3005"
    env_file: .env
    depends_on:
      - x3-ui
    networks:
      - izinet-net

  x3-ui:
    image: ghcr.io/mhsanaei/3x-ui:latest
    container_name: x3-ui
    restart: unless-stopped
    ports:
      - "443:443"
      - "2053:2053"
    volumes:
      - ./xui-db:/etc/x-ui
    networks:
      - izinet-net

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "3443:3443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    environment:
      - DOMAIN=${DOMAIN}
    depends_on:
      - izinet-app
    networks:
      - izinet-net

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - izinet-net

networks:
  izinet-net:
    driver: bridge
