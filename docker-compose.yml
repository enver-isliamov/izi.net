services:
  izinet-app:
    build:
      context: .
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    container_name: izinet-app
    restart: unless-stopped
    ports:
      - "3005:3005"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - NODE_ENV=production
      - XUI_HOST=http://x3-ui:2053
      - IS_DOCKER=true
    env_file:
      - .env
    depends_on:
      - x3-ui
    networks:
      - izinet-net

  x3-ui:
    image: ghcr.io/mhsanaei/3x-ui:latest
    container_name: x3-ui
    restart: unless-stopped
    ports:
      - "2053:2053"
      - "443:443"
      - "8443:8443"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./xui-db:/etc/x-ui
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - izinet-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--spider", "http://localhost:2053"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  izinet-net:
    driver: bridge
