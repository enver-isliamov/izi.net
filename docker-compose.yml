services:
  izinet-app:
    build:
      context: .
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    container_name: izinet-app
    restart: unless-stopped
    ports:
      - "3005:3005"
      - "80:3005" # Map host port 80 to web app port 3005 so http://izinet.online works
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - NODE_ENV=production
      - XUI_HOST=http://x3-ui:2053
    env_file:
      - .env
    depends_on:
      - x3-ui
    networks:
      - izinet-net

  x3-ui:
    image: ghcr.io/mhsanaei/3x-ui:latest
    container_name: x3-ui
    restart: unless-stopped
    ports:
      - "2053:2053" # Panel port
      - "41758:2053" # Map host 41758 to container 2053 where x-ui is running
      - "8443:8443" # Alternate panel / VPN port
      - "443:443"   # Common VPN port
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - XUI_LOG_LEVEL=info
    volumes:
      - ./xui-db:/etc/x-ui
      - ./xui-cert:/root/cert
    networks:
      - izinet-net

networks:
  izinet-net:
    driver: bridge

volumes:
  xui-db:
  xui-cert:
