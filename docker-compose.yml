services:
  izinet-app:
    build:
      context: .
    container_name: izinet-app
    restart: unless-stopped
    ports:
      - "3005:3005"
    env_file: .env
    depends_on:
      - x3-ui
    networks:
      - izinet-net

  x3-ui:
    image: ghcr.io/mhsanaei/3x-ui:latest
    container_name: x3-ui
    restart: unless-stopped
    ports:
      - "443:443"
      - "2053:2053"
      - "8443:8443"
    volumes:
      - ./xui-db:/etc/x-ui
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - izinet-net

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "3443:3443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt/live/izinet.online/fullchain.pem:/etc/letsencrypt/fullchain.pem:ro
      - /etc/letsencrypt/live/izinet.online/privkey.pem:/etc/letsencrypt/privkey.pem:ro
    depends_on:
      - izinet-app
    networks:
      - izinet-net

networks:
  izinet-net:
    driver: bridge
