version: '3.8'

services:
  izinet-app:
    build:
      context: .
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    container_name: izinet-app
    restart: unless-stopped
    ports:
      # Пробрасываем порт 3005 хоста на порт 3000 внутри контейнера,
      # так как 3000 у вас занят AdGuard'ом.
      - "3005:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
